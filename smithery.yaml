# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
# Repo: https://github.com/den-indance/network-diagram-mcp
# npm:  https://www.npmjs.com/package/@den.dance/network-diagram-mcp
#
# This MCP server is a stdio↔WebSocket bridge: the stdio side talks to the
# LLM agent, the WebSocket side talks to an open NetMap browser tab at
# https://map.den.dance/. The server is fully local — Smithery's inspector
# will discover the 44 tools, but actual tool calls require a NetMap tab
# with Settings → ⚙ → MCP Agent Bridge → Enable WebSocket connection.

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required: []
    properties:
      netmapMcpPort:
        type: number
        default: 47821
        description: "Local WebSocket port the bridge listens on. Must match the URL in NetMap's Settings → MCP Agent Bridge."
  commandFunction:
    # A function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({ command: 'npx', args: ['@den.dance/network-diagram-mcp'], env: { NETMAP_MCP_PORT: String(config.netmapMcpPort ?? 47821) } })
